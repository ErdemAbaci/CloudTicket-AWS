Resources:
  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ${self:provider.environment.MEDIA_BUCKET_NAME}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: false
        IgnorePublicAcls: true
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
              - HEAD
            MaxAge: 3000

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: { Ref: MediaBucket }
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadQRCodes
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: "arn:aws:s3:::${self:provider.environment.MEDIA_BUCKET_NAME}/qrcodes/*"
