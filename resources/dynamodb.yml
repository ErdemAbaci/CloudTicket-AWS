Resources:
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ${self:provider.environment.EVENTS_TABLE}
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  TicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ${self:provider.environment.TICKETS_TABLE}
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: ticketId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: ticketId
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  TicketHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ${self:provider.environment.HISTORY_TABLE}
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: purchasedAt
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
        - AttributeName: purchasedAt
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  AiRecommendationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ${self:provider.environment.AI_RECOMMENDATIONS_TABLE}
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  PurchaseRateLimitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ${self:provider.environment.PURCHASE_RATE_LIMITS_TABLE}
      AttributeDefinitions:
        - AttributeName: limiterKey
          AttributeType: S
      KeySchema:
        - AttributeName: limiterKey
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
