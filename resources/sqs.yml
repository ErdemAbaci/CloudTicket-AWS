Resources:
  TicketQueueDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: ${self:service}-queue-dlq-${sls:stage}

  TicketQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: ${self:service}-queue-${sls:stage}
      RedrivePolicy:
        deadLetterTargetArn: { Fn::GetAtt: [TicketQueueDLQ, Arn] }
        maxReceiveCount: 3

  TicketQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - { Ref: TicketQueue }
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "events.amazonaws.com" # EventBridge servisi
            Action: "sqs:SendMessage"
            Resource: { Fn::GetAtt: [TicketQueue, Arn] }
            Condition:
              ArnEquals:
                "aws:SourceArn": { Fn::GetAtt: [EventToSQSRule, Arn] }
