service: cloud-ticket-backend
frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-central-1
  memorySize: 128
  tracing:
    lambda: true
    apiGateway: true
  environment:
    EVENTS_TABLE: ${self:service}-events-table-${sls:stage}
    TICKETS_TABLE: ${self:service}-tickets-table-${sls:stage}
    HISTORY_TABLE: ${self:service}-history-table-${sls:stage}
    QUEUE_URL: { Ref: TicketQueue }
    EVENT_BUS_NAME: { Ref: EventBus }
    MEDIA_BUCKET_NAME: ${self:service}-media-${sls:stage}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
          Resource: 
            - "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.EVENTS_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.TICKETS_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.HISTORY_TABLE}"
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource: { Fn::GetAtt: [TicketQueue, Arn] }
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"
        - Effect: Allow
          Action:
            - events:PutEvents # EventBridge'e olay fırlatma yetkisi
          Resource: { Fn::GetAtt: [EventBus, Arn] }  
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: "arn:aws:s3:::${self:provider.environment.MEDIA_BUCKET_NAME}/*"

# --- YENİ NESİL TYPESCRIPT AYARI (Plugin yerine Build) ---
build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    exclude: ['aws-sdk']
    target: 'node18'
    platform: 'node'

functions:
  hello:
    handler: src/functions/hello.handler
    events:
      - http:
          path: /hello
          method: get
          cors: true
  createEvent:
    handler: src/functions/event/create.handler
    events:
      - http:
          path: /event
          method: post
          cors: true
          authorizer:
            name: PrivateAuthorizer
            type: COGNITO_USER_POOLS
            arn:
              Fn::GetAtt:
                - CognitoUserPool
                - Arn
  processEvent:
    handler: src/functions/worker/processSQS.handler
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - TicketQueue
              - Arn
          batchSize: 1
  listEvents:
    handler: src/functions/event/list.handler
    events:
      - http:
          path: /events
          method: get
          cors: true
  getEvent:
    handler: src/functions/event/get.handler
    events:
      - http:
          path: /event/{id}
          method: get
          cors: true
  getUploadUrl:
    handler: src/functions/upload/getUrl.handler
    events:
      - http:
          path: /upload-url
          method: get
          cors: true
          authorizer:
            name: PrivateAuthorizer
            type: COGNITO_USER_POOLS
            arn:
              Fn::GetAtt:
                - CognitoUserPool
                - Arn
  purchaseTicket:
    handler: src/functions/ticket/purchase.handler
    events:
      - http:
          path: /event/{id}/purchase
          method: post
          cors: true
          authorizer:
            name: PrivateAuthorizer
            type: COGNITO_USER_POOLS
            arn:
              Fn::GetAtt:
                - CognitoUserPool
                - Arn
  generateTicketQR:
    handler: src/functions/ticket/generateQR.handler
    events:
      - eventBridge:
          eventBus: { Ref: EventBus }
          pattern:
            source:
              - "com.cloudticket"
            detail-type:
              - "TicketPurchased"
  listMyTickets:
    handler: src/functions/ticket/listMyTickets.handler
    events:
      - http:
          path: /my-tickets
          method: get
          cors: true
          authorizer:
            name: PrivateAuthorizer
            type: COGNITO_USER_POOLS
            arn:
              Fn::GetAtt:
                - CognitoUserPool
                - Arn
  recordAnalytics:
    handler: src/functions/ticket/recordAnalytics.handler
    events:
      - eventBridge:
          eventBus: { Ref: EventBus }
          pattern:
            source:
              - "com.cloudticket"
            detail-type:
              - "TicketPurchased"
  updateDynamicPrices:
    handler: src/functions/pricing/updateDynamicPrices.handler
    timeout: 30
    events:
      - schedule:
          name: ${self:service}-dynamic-pricing-${sls:stage}
          description: TicketMind dinamik fiyat motoru - her gece 03:00 Europe/Istanbul
          rate: cron(0 0 * * ? *)
          enabled: true

resources:
  - ${file(resources/dynamodb.yml)}
  - ${file(resources/sqs.yml)}
  - ${file(resources/cognito.yml)}
  - ${file(resources/eventbridge.yml)}
  - ${file(resources/s3.yml)}
